name: Bug Report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out every section — incomplete reports take much longer to diagnose.

  - type: input
    id: version
    attributes:
      label: BeadSpec version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: bd-version
    attributes:
      label: bd CLI version
      description: Run `bd --version`
      placeholder: "e.g. bd 1.2.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open BeadSpec
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant logs. Check the Tauri console (View → Developer Tools on macOS) or the dolt-server recovery dialog.
      render: shell
