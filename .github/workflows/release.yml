name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ''
          - os: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            build-essential

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2

      - name: Install JS deps
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BeadSpec ${{ github.ref_name }}'
          releaseBody: |
            ## Prerequisites

            Install **bd** before launching BeadSpec — it provides the database layer (`dolt` is provisioned automatically by `bd`):

            - **macOS**: `brew install bd` (or download from the bd releases page)
            - **Linux**: download the `bd` binary and place it on your PATH
            - **Windows**: download `bd.exe` and place it on your PATH

            See the [README](https://github.com/boardthatpowder/BeadSpec#prerequisites) for full setup instructions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
